services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_marketplace_nginx
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/SenhaSegura123
    volumes:
      - neo4j_nginx_data:/data
      - neo4j_nginx_logs:/logs
      - neo4j_nginx_import:/var/lib/neo4j/import
    networks:
      - marketplace_nginx_network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p SenhaSegura123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_marketplace_nginx
    environment:
      - PORT=3001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SenhaSegura123
      - NEO4J_CONNECT_RETRIES=20
      - NEO4J_CONNECT_RETRY_DELAY_MS=5000
      - JWT_SECRET=u9X!mN2$$fK5&vB8*qZ1_pL7@wE4#jR6%
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost
    expose:
      - "3001"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - marketplace_nginx_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_URL: /api
    container_name: frontend_marketplace_nginx
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - marketplace_nginx_network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_marketplace
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - marketplace_nginx_network
    restart: unless-stopped

networks:
  marketplace_nginx_network:
    driver: bridge

volumes:
  neo4j_nginx_data:
  neo4j_nginx_logs:
  neo4j_nginx_import:
