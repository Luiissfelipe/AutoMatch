services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_marketplace
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/SenhaSegura123
    volumes:
      - ./neo4j_data/data:/data
      - ./neo4j_data/logs:/logs
      - ./neo4j_data/import:/var/lib/neo4j/import
    networks:
      - marketplace_network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p SenhaSegura123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_marketplace
    environment:
      - PORT=3001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SenhaSegura123
      - NEO4J_CONNECT_RETRIES=20
      - NEO4J_CONNECT_RETRY_DELAY_MS=5000
      - JWT_SECRET=u9X!mN2$$fK5&vB8*qZ1_pL7@wE4#jR6%
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - marketplace_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: frontend_marketplace
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - marketplace_network
    restart: unless-stopped

networks:
  marketplace_network:
    driver: bridge
